<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{{ app_brand or "Eonexea" }} HHAH Portal{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script defer src="https://unpkg.com/alpinejs@3.13.10/dist/cdn.min.js"></script>
  <style>
    :root {
      --c-bg:        #f8fafc;
      --c-panel:     #ffffff;
      --c-border:    #e2e8f0;
      --c-text:      #0f172a;
      --c-text-dim:  #64748b;
      --c-brand:     #2563eb;
      --c-brand-2:   #1e40af;
      --c-success:   #16a34a;
      --c-warn:      #d97706;
      --c-danger:    #dc2626;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; color: var(--c-text); background: var(--c-bg); }
    .htmx-indicator { display: none; }
    .htmx-request .htmx-indicator { display: inline-block; }
  </style>
  {% block head_extra %}{% endblock %}
</head>
<body class="min-h-screen">
  {% block body %}{% endblock %}
</body>
</html>
